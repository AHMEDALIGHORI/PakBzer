<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${category.displayName})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<header class="category-banner text-light" th:style="'background-image:url(' + ${category.heroImage} + ')'">
    <div class="container py-5">
        <h1 class="fw-bold" th:text="${category.displayName}">Category</h1>
        <p class="lead mb-0" th:text="${category.description}">Description</p>
    </div>
</header>

<div class="container my-4">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <p class="text-muted" th:text="${#lists.size(products)} + ' products found'">0 products</p>

    <div th:if="${#lists.isEmpty(products)}" class="alert alert-info">
        No products in this category yet. Please check back soon.
    </div>

    <div class="row g-3">
        <th:block th:each="product : ${products}">
            <div th:replace="~{fragments/components :: productCard(${product})}"></div>
        </th:block>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
