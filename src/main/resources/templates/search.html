<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Search')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="container my-4">
    <h2 class="section-title mb-1">Search Results</h2>
    <p class="text-muted" th:if="${query}" th:text="'Showing results for: ' + ${query}">query</p>

    <div th:if="${#lists.isEmpty(results)}" class="alert alert-info">
        No products matched your search. Try a different keyword such as "kurta", "lawn" or "shoes".
    </div>

    <div class="row g-3">
        <th:block th:each="product : ${results}">
            <div th:replace="~{fragments/components :: productCard(${product})}"></div>
        </th:block>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
