<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<!-- Reusable product card -->
<div th:fragment="productCard(product)" class="col-6 col-md-4 col-lg-3">
    <div class="card h-100 product-card shadow-sm border-0">
        <a th:href="@{'/product/' + ${product.id}}" class="text-decoration-none">
            <img th:src="${product.imageUrl}" class="card-img-top product-img" th:alt="${product.name}"
                 onerror="this.onerror=null;this.src='https://placehold.co/600x700/01411C/ffffff?text=PakBzer';"/>
        </a>
        <div class="card-body d-flex flex-column">
            <span class="badge bg-light text-muted align-self-start mb-1" th:text="${product.brand}">Brand</span>
            <a th:href="@{'/product/' + ${product.id}}" class="text-dark text-decoration-none">
                <h6 class="card-title mb-1" th:text="${product.name}">Product</h6>
            </a>
            <div class="text-warning small mb-1">
                <span th:with="avg=${product.averageRating}">
                    <i class="bi" th:each="i : ${#numbers.sequence(1,5)}"
                       th:classappend="${i <= avg} ? 'bi-star-fill' : 'bi-star'"></i>
                </span>
                <span class="text-muted" th:text="'(' + ${product.reviewCount} + ')'">(0)</span>
            </div>
            <p class="fw-bold text-success mb-2 mt-auto">
                Rs. <span th:text="${#numbers.formatInteger(product.price, 1, 'COMMA')}">0</span>
            </p>
            <form th:action="@{/cart/add}" method="post">
                <input type="hidden" name="productId" th:value="${product.id}"/>
                <button type="submit" class="btn btn-sm btn-success w-100">
                    <i class="bi bi-cart-plus"></i> Add to Cart
                </button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
