spring.config.activate.on-profile=prod

# PostgreSQL (set DB_* in .env or host env vars)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pakbzer}
spring.datasource.username=${DB_USER:pakbazer}
spring.datasource.password=${DB_PASSWORD:pakbazer}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}

spring.h2.console.enabled=false
spring.thymeleaf.cache=true
