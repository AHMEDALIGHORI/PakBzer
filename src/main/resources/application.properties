spring.application.name=PakBzer

# ===== Server =====
server.port=8080

# ===== H2 file database (zero external setup) =====
spring.datasource.url=jdbc:h2:file:./data/pakbzer;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
# Keep the session open during view rendering so lazy collections
# (e.g. Product.reviews used for average ratings) load safely in Thymeleaf.
spring.jpa.open-in-view=true

# H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== Thymeleaf =====
spring.thymeleaf.cache=false

# ===========================================================
# OAuth2 (Google) login  ->  paste the keys you provide here
# Get them from https://console.cloud.google.com/apis/credentials
# Authorized redirect URI: http://localhost:8080/login/oauth2/code/google
# ===========================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:PASTE_GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:PASTE_GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# ===========================================================
# Stripe payment keys  ->  paste the keys you provide here
# Get them from https://dashboard.stripe.com/apikeys
# ===========================================================
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_PASTE_STRIPE_SECRET_KEY}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:pk_test_PASTE_STRIPE_PUBLISHABLE_KEY}
stripe.currency=pkr
app.base-url=http://localhost:8080
