spring.application.name=PakBzer

# ===== Server =====
server.port=${PORT:8080}
server.forward-headers-strategy=framework

# ===== H2 file database (zero external setup) =====
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/pakbzer;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
# Keep the session open during view rendering so lazy collections
# (e.g. Product.reviews used for average ratings) load safely in Thymeleaf.
spring.jpa.open-in-view=true

# H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# ===== Thymeleaf =====
spring.thymeleaf.cache=${THYMELEAF_CACHE:false}

# ===========================================================
# OAuth2 (Google) login  ->  paste the keys you provide here
# Get them from https://console.cloud.google.com/apis/credentials
# Authorized redirect URI:
#   - Local:  http://localhost:8080/login/oauth2/code/google
#   - Deploy: https://your-domain.com/login/oauth2/code/google
# ===========================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://openidconnect.googleapis.com/v1/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# ===========================================================
# Stripe payment keys  ->  paste the keys you provide here
# Get them from https://dashboard.stripe.com/apikeys
# ===========================================================
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:}
stripe.currency=${STRIPE_CURRENCY:pkr}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
app.base-url=${APP_BASE_URL:http://localhost:8080}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.cors-origins=${CORS_ORIGINS:http://localhost:5173}

# ===========================================================
# SendGrid transactional email
# ===========================================================
sendgrid.api-key=${SENDGRID_API_KEY:}
sendgrid.from=${SENDGRID_FROM:noreply@pakbazer.pk}

# ===========================================================
# Google Cloud Storage (product images)
# Set GOOGLE_APPLICATION_CREDENTIALS to your service-account JSON path locally.
# ===========================================================
gcp.project-id=${GCP_PROJECT_ID:}
gcp.storage.bucket=${GCP_STORAGE_BUCKET:}
